<script>
    // 這裡是你所有書櫃的資料區
    const libraryData = {
        "SEVENTEEN": [
            { color: "#c62828", books: [{title: "親愛的路人", author: "一比嘎", ships: ["喆漢"], tags: ["G", "Complete"], link: "#"}] },
            { color: "#ef6c00", books: [] }, 
            { color: "#f9a825", books: [] }, 
            { color: "#2e7d32", books: [] }, 
            { color: "#1565c0", books: [] }, 
            { color: "#283593", books: [] }, 
            { color: "#6a1b9a", books: [] }
        ],
        "CRAVITY": [
            { color: "#c62828", books: [] }, { color: "#ef6c00", books: [] }, { color: "#f9a825", books: [] }, { color: "#2e7d32", books: [] }, { color: "#1565c0", books: [] }, { color: "#283593", books: [] }, { color: "#6a1b9a", books: [] }
        ],
        "My Love": [
            { color: "#c62828", books: [] }, { color: "#ef6c00", books: [] }, { color: "#f9a825", books: [] }, { color: "#2e7d32", books: [] }, { color: "#1565c0", books: [] }, { color: "#283593", books: [] }, { color: "#6a1b9a", books: [] }
        ],
        "Cerulean": [
            { 
                color: "#c62828", 
                books: [
                    {
                        title: "你的書名", 
                        author: "你的名字", 
                        ships: ["角色A/角色B"], 
                        tags: ["G", "Complete", "你的標籤"], 
                        link: "小說網址"
                    }
                ] 
            },
            { color: "#ef6c00", books: [] }, 
            { color: "#f9a825", books: [] }, 
            { color: "#2e7d32", books: [] }, 
            { color: "#1565c0", books: [] }, 
            { color: "#283593", books: [] }, 
            { color: "#6a1b9a", books: [] }
        ]
    };

    let currentCabinet = 'SEVENTEEN';

    function switchCabinet(name) {
        currentCabinet = name;
        document.getElementById('shipSearch').value = '';
        renderCabinet(libraryData[name]);
    }

    function renderCabinet(layers) {
        const root = document.getElementById('library-root');
        root.innerHTML = `
            <div class="big-cabinet">
                <div class="cabinet-header">${currentCabinet}</div>
                ${layers.map(layer => `
                    <div class="shelf-layer">
                        ${layer.books.map(book => `
                            <div class="novel-spine" style="background-color: ${layer.color}" onclick='openModal(${JSON.stringify(book)})'>
                                <div class="spine-title">${book.title}</div>
                                <div class="spine-color-code">${layer.color}</div>
                            </div>
                        `).join('')}
                        ${Array(Math.max(0, 8 - layer.books.length)).fill(0).map(() => `<div style="border-left: 1px solid rgba(0,0,0,0.05); height: 10px;"></div>`).join('')}
                    </div>
                `).join('')}
            </div>
        `;
    }

    function handleSearch() {
        const term = document.getElementById('shipSearch').value.toLowerCase();
        const filteredLayers = libraryData[currentCabinet].map(layer => ({
            ...layer,
            books: layer.books.filter(book => book.ships.some(ship => ship.toLowerCase().includes(term)))
        }));
        renderCabinet(filteredLayers);
    }

    function openModal(book) {
        const body = document.getElementById('modalBody');
        body.innerHTML = `
            <div class="book-detail-title">${book.title}</div>
            <div class="book-author">by ${book.author}</div>
            <div class="ao3-tags">
                <span class="tag-bold">${book.tags[0] || 'Tag'}</span>,
                ${book.ships.map(s => `<span>${s}</span>`).join(', ')},
                ${book.tags.slice(1).map(t => `<span>${t}</span>`).join(', ')}
            </div>
            <a href="${book.link}" target="_blank" class="read-btn">Read Original →</a>
        `;
        document.getElementById('modalOverlay').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('modalOverlay').style.display = 'none';
    }

    // 初次載入顯示 SEVENTEEN
    switchCabinet('SEVENTEEN');
</script>
